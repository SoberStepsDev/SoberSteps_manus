# Runs on every push / PR — does not require repository secrets.
name: Flutter CI

on:
  push:
    branches: [main, 'chore/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub --congratulate

      - name: Test
        run: flutter test
