# Runs on every push / PR — does not require repository secrets.
name: Flutter CI

on:
  push:
    branches: [main, 'chore/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: false

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub --congratulate

      - name: Test
        run: flutter test

  integration-test-android:
    needs: analyze-test
    # Emulator is slow/flaky on PRs; keep minutes for main + manual runs.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: false

      - name: Pub get
        run: flutter pub get

      - name: Integration test (Android emulator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: Nexus 6
          script: flutter test integration_test/sobersteps_e2e_test.dart
