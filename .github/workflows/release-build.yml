name: Release Build (AAB)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Umożliwia ręczne uruchomienie przyciskiem w zakładce Actions

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          # Must match pubspec environment.sdk (^3.11.0); 3.24.x ships older Dart.
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: false

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks
          cat > android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: Build release AAB
        run: |
          flutter build appbundle --release \
            --dart-define=IS_DEVELOPMENT=false \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=REVENUECAT_ANDROID_KEY=${{ secrets.REVENUECAT_ANDROID_KEY }} \
            --dart-define=ONESIGNAL_APP_ID=${{ secrets.ONESIGNAL_APP_ID }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sobersteps-release-${{ github.ref_name }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

