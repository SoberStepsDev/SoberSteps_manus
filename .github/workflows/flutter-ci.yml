name: Flutter CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Check for hardcoded secrets
        run: |
          if grep -rn "sk_live\|AAAA.*:APA\|AIzaSy" lib/ --include="*.dart"; then
            echo "FAIL: Hardcoded secrets found"
            exit 1
          fi
          echo "OK: No hardcoded secrets"
